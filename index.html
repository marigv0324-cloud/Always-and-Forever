<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosotros 2.0 ❤️</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow:0px 0px 25px rgba(255,255,255,0.1);
}

h1{
    color:#ff4d6d;
}

button{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    transform:scale(1.05);
}

#mensaje{
    margin-top:20px;
    font-size:18px;
}

</style>
</head>

<body>

<div class="card">

<h1>Proyecto: Nosotros 2.0 ❤️</h1>

<p>
Sé que hubo errores en el sistema...
pero todavía quiero construir contigo.
</p>

<button onclick="mostrarMensaje()">
Iniciar programa
</button>

<div id="mensaje"></div>

</div>

<script>

function mostrarMensaje(){

document.getElementById("mensaje").innerHTML = `
<p>
while(alive){<br>
&nbsp;&nbsp;loveYou();<br>
}
</p>

<p>
Gracias por seguir aquí conmigo ❤️
</p>
`;

}

</script>

<!-- Gracias por existir -->
<!-- Eres mi persona favorita -->

</body>
</html>
